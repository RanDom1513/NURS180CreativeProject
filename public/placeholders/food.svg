<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Food photograph placeholder</title>
  <desc id="desc">An abstract overhead table setting awaiting a personal food photograph.</desc>
  <defs>
    <radialGradient id="plate" cx="45%" cy="40%" r="60%">
      <stop stop-color="#fff4dd"/>
      <stop offset="1" stop-color="#d6c3a4"/>
    </radialGradient>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3a1f1e"/>
      <stop offset="1" stop-color="#825345"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#table)"/>
  <circle cx="800" cy="480" r="340" fill="#1e1212" opacity=".28"/>
  <circle cx="800" cy="460" r="300" fill="url(#plate)"/>
  <circle cx="800" cy="460" r="214" fill="#b85d3d"/>
  <path d="M650 410c120-130 250-85 298 25-104 110-201 139-298-25Z" fill="#edc266"/>
  <path d="M730 550c85-78 176-72 233 8-89 70-162 89-233-8Z" fill="#446d4b"/>
  <circle cx="640" cy="540" r="48" fill="#d9933f"/>
  <circle cx="978" cy="375" r="37" fill="#f1d6a5"/>
  <text x="80" y="900" fill="#fff0dd" font-family="Arial, sans-serif" font-size="36" letter-spacing="7">YOUR FOOD MEMORY</text>
</svg>
